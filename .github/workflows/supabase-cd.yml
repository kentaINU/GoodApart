name: Supabase Database CD (via Python Models)

on:
  push:
    branches:
      - develop
    paths:
      # 💡 models.py から、database フォルダ配下の変更を検知するように修正
      - 'backend/database/models/**'
      - '.github/workflows/supabase-cd.yml'

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 💡 requirements.txt が backend/ にある想定で、そこから一括インストールする方が安全です
      # (もし個別にやるなら、インポートエラーを防ぐために requests や pydantic などの依存も必要になる場合があるため)
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # 💡 パッケージとして初期化関数（create_tables）を呼び出すように修正
      - name: Run database.models to sync schema
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          cd backend
          python -c "from database.models import create_tables; create_tables(); print('本番DBへのテーブル構築・更新命令を強制実行しました')"