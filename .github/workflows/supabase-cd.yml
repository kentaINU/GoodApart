name: Supabase Database CD (via Alembic)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/database/**'
      - 'backend/alembic/**'
      - '.github/workflows/*'

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and Run Alembic
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          python -m alembic.config upgrade head
