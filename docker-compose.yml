version: '3.8'

services:
  # バックエンド (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - .:/workspace:cached
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/fukuoka_monthly
    depends_on:
      - db
    command: sleep infinity
    tty: true

  # 空間データベース (PostGIS)
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      - Postgres_USER=user
      - Postgres_PASSWORD=password
      - Postgres_DB=fukuoka_monthly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  # フロントエンド (Next.js 15)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    working_dir: /workspace
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    tty: true

volumes:
  postgres_data: